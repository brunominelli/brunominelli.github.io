<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TITLE OTIMIZADO -->
    <title>{% block title %}{% endblock %}</title>

    <!-- SEO PRINCIPAL -->
    <meta name="description"
        content="Bruno Minelli desenvolve automações personalizadas para freelancers, autônomos e pequenos negócios que utilizam planilhas e precisam transformar dados em decisões estratégicas.">

    <meta name="keywords" content="
    automação personalizada,
    automação para freelancers,
    automação para autônomos,
    organização financeira pequeno negócio,
    relatórios automatizados,
    automação de planilhas,
    desenvolvedor de automações,
    automação sob medida Brasil
    ">

    <meta name="author" content="Bruno Minelli">
    <meta name="robots" content="index, follow">
    <meta name="language" content="pt-BR">

    <!-- CANONICAL -->
    <link rel="canonical" href="https://brunominelli.github.io/">

    <!-- OPEN GRAPH (Facebook / LinkedIn) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Bruno Minelli | Automação personalizada sob medida">
    <meta property="og:description"
        content="Transforme suas planilhas em relatórios automatizados e decisões claras para o seu negócio.">
    <meta property="og:url" content="https://brunominelli.github.io/">
    <meta property="og:site_name" content="Bruno Minelli">

    <!-- TWITTER CARD -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Automação personalizada para freelancers e pequenos negócios">
    <meta name="twitter:description"
        content="Automação sob medida para quem usa planilhas e precisa de clareza financeira.">

    <!-- SCHEMA MARKUP AVANÇADO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Bruno Minelli",
      "description": "Automação personalizada para freelancers, autônomos e pequenos negócios.",
      "url": "https://brunominelli.github.io/",
      "areaServed": {
        "@type": "Country",
        "name": "Brasil"
      },
      "founder": {
        "@type": "Person",
        "name": "Bruno Minelli"
      },
      "serviceType": "Automação de dados e relatórios personalizados"
    }
    </script>

    <!-- CSS -->
    <style>
        :root {
            --primary: #1f2937;
            --accent: #584464;
            --light: #f9fafb;
            --gray: #6b7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: var(--light);
            color: var(--primary);
            line-height: 1.6;
        }

        header {
            background: white;
            padding: 20px 40px;
            border-bottom: 1px solid #e5e7eb;
        }

        header h1 {
            /* font-size: 20px; */
            font-weight: 600;
            margin-bottom: 0px;
        }

        header a {
            text-decoration: none;
        }

        main {
            padding: 60px 20px;
            max-width: 900px;
            margin: auto;
        }

        section {
            margin-bottom: 60px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            line-height: 1.2;
            color: var(--accent);
        }

        h2 {
            font-size: 28px;
            margin-bottom: 20px;
            color: var(--accent);
        }

        h3 {
            margin-top: 30px;
            margin-bottom: 10px;
            color: var(--accent);
        }

        p {
            margin-bottom: 15px;
            color: var(--gray);
        }

        ul,
        ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .hero {
            text-align: center;
            margin-bottom: 80px;
        }

        .cta {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 28px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: 0.3s;
        }

        .cta:hover {
            opacity: 0.75;
        }

        button {
            margin-top: 10px;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.75;
        }

        /* ===== FORMULÁRIO ===== */

        .form-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        form h3 {
            margin-top: 30px;
            font-size: 18px;
            color: var(--primary);
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 8px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
        }

        input,
        select,
        textarea {
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.2s ease;
            background: #fafafa;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea {
            resize: vertical;
        }

        button.cta {
            margin-top: 20px;
            padding: 16px;
            font-size: 15px;
            background: var(--accent);
            border-radius: 8px;
            transition: 0.2s ease;
        }

        button.cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .success {
            height: 45vh;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid #e5e7eb;
            background: white;
            font-size: 14px;
            color: var(--gray);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 28px;
            }

            h2 {
                font-size: 22px;
            }

            main {
                padding: 40px 20px;
            }
        }
    </style>
</head>

<body>
    <header>
        <a href="{{ url_for('institutional.index') }}">
            <h1>Bruno Minelli</h1>
            <p>Automação personalizada para freelancers, autônomos e pequenos negócios</p>
        </a>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>&copy;2026&copy; Bruno Minelli | Automação sob medida para negócios orientados por dados</p>
    </footer>
</body>

</html>
